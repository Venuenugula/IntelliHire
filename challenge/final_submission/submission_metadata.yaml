ai_tools_used:
  - "Claude"   # Claude Code: dataset forensics, engine design, measurement harness

ai_usage_summary: |
  Used Claude (Claude Code) for dataset forensic analysis, ranking-engine design,
  and building the measurement/validation harness (ablation, rank-correlation,
  boundary analysis). No candidate data was sent to any LLM during ranking — the
  ranker is fully deterministic, offline, CPU-only, and entirely rule-based and
  inspectable. Claude assisted the engineers; it is not in the ranking path.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic, CPU-only, offline rule-based ranker (no LLM/network in the ranking
  path). The JD is interpreted as a structured RoleDNA: six capability groups
  (retrieval/IR, ranking/recsys, NLP/LLM, production systems, evaluation, LLM-tooling)
  with JD-provenance weights. Two streaming passes over candidates.jsonl: (1) corpus
  skill document-frequency -> IDF rarity; (2) score every candidate. The additive base
  is led by capability match (IDF-rarity x endorsement-and-duration credibility), plus
  assessment evidence, JD-narrative text relevance, and title fit. A current-title gate
  suppresses off-target roles; a boilerplate-summary detector neutralises the dataset's
  keyword-stuffer honeypots; experience and recruiter-behavioural availability act as
  bounded multiplicative priors, not additive drivers. Career trajectory and company
  name were measured to be redundant/noise and excluded. Every design decision was
  validated with a measurement harness (feature ablation, Spearman/Kendall, capability-
  group ablation, semantic-robustness perturbation, boundary sensitivity), not intuition.
  Runtime ~20s for 100k candidates on 4 CPU cores.

