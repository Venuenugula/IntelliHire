# Alembic configuration for DELULU v2 persistence layer.
#
# The DB URL is supplied at runtime from app settings (alembic/env.py reads
# settings.database_url_sync), so sqlalchemy.url is intentionally left blank here.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
